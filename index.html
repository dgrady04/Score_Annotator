  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';

    const firebaseConfig = {
      apiKey: "AIzaSyB6LiG7z_7f42AIc0qFUaXOayE_jSwwPwk",
      authDomain: "score-annotator.firebaseapp.com",
      projectId: "score-annotator",
      storageBucket: "score-annotator.firebasestorage.app",
      messagingSenderId: "555254309079",
      appId: "1:555254309079:web:99e4b1e9ad39c0c671d092",
      measurementId: "G-GL4HRJ91CK"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    // --- MUSICAL LOGIC & SMART PARSER ---
    const PITCHES = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'F#', 'G', 'Ab', 'A', 'Bb', 'B'];
    const ROMAN = ['I', 'bII', 'II', 'bIII', 'III', 'IV', '#IV', 'V', 'bVI', 'VI', 'bVII', 'VII'];
    const ROMAN_MINOR = ['i', 'bii', 'ii', 'biii', 'iii', 'iv', '#iv', 'v', 'bvi', 'vi', 'bvii', 'vii'];
    const NASHVILLE = ['1', 'b2', '2', 'b3', '3', '4', '#4', '5', 'b6', '6', 'b7', '7'];

    const getRootIndex = (str, keyIndex) => {
      const pIdx = PITCHES.findIndex(p => str.startsWith(p));
      if (pIdx !== -1) return { index: pIdx, match: PITCHES[pIdx], type: 'jazz' };
      
      const rIdx = ROMAN.findIndex(r => str.startsWith(r));
      if (rIdx !== -1) return { index: (keyIndex + rIdx) % 12, match: ROMAN[rIdx], type: 'roman_maj' };
      
      const rmIdx = ROMAN_MINOR.findIndex(rm => str.startsWith(rm));
      if (rmIdx !== -1) return { index: (keyIndex + rmIdx) % 12, match: ROMAN_MINOR[rmIdx], type: 'roman_min' };

      const nIdx = NASHVILLE.findIndex(n => str.startsWith(n));
      if (nIdx !== -1) return { index: (keyIndex + nIdx) % 12, match: NASHVILLE[nIdx], type: 'nashville' };

      return null;
    };

    const formatQualityStr = (q, prefs) => {
      let f = q;
      if (prefs.halfDim !== 'm7b5') f = f.replace(/m7b5/g, prefs.halfDim);
      if (prefs.dim !== 'dim') f = f.replace(/dim/g, prefs.dim);
      if (prefs.major !== 'maj') f = f.replace(/maj/g, prefs.major);
      
      if (prefs.minor !== 'm' && f.startsWith('m')) f = prefs.minor + f.substring(1);
      return f;
    };

    const parseAndTranslateChord = (input, globalKey, prefs, dict) => {
      if (!input) return { jazz: '', roman: '', nashville: '' };
      
      const customMatch = dict.find(d => d.trigger.toLowerCase() === input.toLowerCase());
      if (customMatch) return { jazz: customMatch.jazz, roman: customMatch.roman, nashville: customMatch.nashville };

      const keyIndex = PITCHES.indexOf(globalKey) || 0;

      if (input.includes('|')) {
        const [top, bottom] = input.split('|');
        const t = parseAndTranslateChord(top.trim(), globalKey, prefs, dict);
        const b = parseAndTranslateChord(bottom.trim(), globalKey, prefs, dict);
        return { jazz: `${t.jazz} | ${b.jazz}`, roman: `${t.roman} | ${b.roman}`, nashville: `${t.nashville} | ${b.nashville}` };
      }
      
      if (input.includes('/')) {
        const [base, bass] = input.split('/');
        const ba = parseAndTranslateChord(base.trim(), globalKey, prefs, dict);
        const bs = parseAndTranslateChord(bass.trim(), globalKey, prefs, dict);
        return {
          jazz: `${ba.jazz}/${bs.jazz.replace(/[^A-G#b]/g, '')}`,
          roman: `${ba.roman}/${bs.roman.replace(/[^IivVb#]/g, '')}`,
          nashville: `${ba.nashville}/${bs.nashville.replace(/[^1-7b#]/g, '')}`
        };
      }

      const rootData = getRootIndex(input, keyIndex);
      if (!rootData) return { jazz: input, roman: input, nashville: input };

      const qualityAndExtensions = input.substring(rootData.match.length);
      const distance = (rootData.index - keyIndex + 12) % 12;

      const isMinor = rootData.type === 'roman_min' || qualityAndExtensions.startsWith('m') || qualityAndExtensions.startsWith('dim');
      let romanBase = isMinor ? ROMAN_MINOR[distance] : ROMAN[distance];
      let romanQuality = qualityAndExtensions;
      
      if (romanQuality.startsWith('m') && !romanQuality.startsWith('maj')) romanQuality = romanQuality.substring(1);

      if (isMinor && prefs.romanCase === 'upper') {
        romanBase = ROMAN[distance];
        if (!qualityAndExtensions.startsWith('dim') && !qualityAndExtensions.startsWith('m7b5')) romanQuality = 'm' + romanQuality; 
      }

      return {
        jazz: `${PITCHES[rootData.index]}${formatQualityStr(qualityAndExtensions, prefs)}`,
        roman: `${romanBase}${formatQualityStr(romanQuality, prefs)}`,
        nashville: `${NASHVILLE[distance]}${formatQualityStr(qualityAndExtensions, prefs)}`
      };
    };

    const PageThumbnail = ({ pdfDoc, pageNum, isActive, onClick }) => {
      const thumbCanvasRef = useRef(null);
      const renderTaskRef = useRef(null);

      useEffect(() => {
        if (!pdfDoc) return;
        let isMounted = true;
        const renderThumb = async () => {
          try {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 0.25 }); 
            const canvas = thumbCanvasRef.current;
            if (!canvas || !isMounted) return;
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            if (renderTaskRef.current) renderTaskRef.current.cancel();
            renderTaskRef.current = page.render({ canvasContext: context, viewport });
          } catch (err) {}
        };
        renderThumb();
        return () => { isMounted = false; if(renderTaskRef.current) renderTaskRef.current.cancel(); };
      }, [pdfDoc, pageNum]);

      return (
        <div onClick={onClick} className={`cursor-pointer transition-all border-2 rounded overflow-hidden flex-shrink-0 bg-white ${isActive ? 'border-blue-500 shadow-md scale-105' : 'border-transparent hover:border-slate-300'}`}>
          <canvas ref={thumbCanvasRef} className="block w-24 h-auto" />
        </div>
      );
    };

    function App() {
      // Auth State
      const [currentUser, setCurrentUser] = useState(null);
      const [showAuthModal, setShowAuthModal] = useState(false);
      const [authMode, setAuthMode] = useState('login'); // 'login' or 'register'
      const [authEmail, setAuthEmail] = useState('');
      const [authPassword, setAuthPassword] = useState('');
      const [authError, setAuthError] = useState('');

      // Theme State
      const [appTheme, setAppTheme] = useState('light');

      const [pdfReady, setPdfReady] = useState(false);
      
      // Thumbnail Generator
      useEffect(() => {
        if (pdfReady && canvasRefs.current[1]) {
           const timer = setTimeout(() => {
              try {
                 const c = canvasRefs.current[1];
                 const thumbCanvas = document.createElement('canvas');
                 thumbCanvas.width = c.width / 1.5;
                 thumbCanvas.height = c.height / 1.5;
                 const ctx = thumbCanvas.getContext('2d');
                 ctx.drawImage(c, 0, 0, thumbCanvas.width, thumbCanvas.height);
                 const dataUrl = thumbCanvas.toDataURL('image/jpeg', 0.75);
                 
                 setProjects(prev => {
                    let pList = [...prev];
                    const pIndex = pList.findIndex(p => p.id === currentProjectId);
                    if (pIndex !== -1 && pList[pIndex].thumbnail !== dataUrl) {
                       pList[pIndex].thumbnail = dataUrl;
                       return pList;
                    }
                    return prev;
                 });
              } catch(e){}
           }, 1500);
           return () => clearTimeout(timer);
        }
      }, [pdfReady, currentProjectId]);
      const [pdfDoc, setPdfDoc] = useState(null);
      const [originalPdfBytes, setOriginalPdfBytes] = useState(null);
      const [pageNum, setPageNum] = useState(1);
      const [numPages, setNumPages] = useState(0);
      const [zoom, setZoom] = useState(1.5);
      const zoomRef = useRef(zoom);
      const [viewMode, setViewMode] = useState('single'); // 'single' | 'continuous'
      
      const [currentKey, setCurrentKey] = useState('C'); 
      const [tool, setTool] = useState('select');
      const [currentShape, setCurrentShape] = useState('rectangle');
      const [currentStamp, setCurrentStamp] = useState('𝄐');
      const [activeLayer, setActiveLayer] = useState('layer-1');
      const [scoreLayers, setScoreLayers] = useState([{id: 'layer-1', name: 'Layer 1', visible: true}]);
      const [hiddenPages, setHiddenPages] = useState([]);
      const [pageOrder, setPageOrder] = useState([]);
      const [importPromptFile, setImportPromptFile] = useState(null);
      const [draggedPageIdx, setDraggedPageIdx] = useState(null);
      const [dropTargetIdx, setDropTargetIdx] = useState(null);

      // Custom Dictionary, Prefs, & Info Modal
      const [showDictModal, setShowDictModal] = useState(false);
      const [showInfoModal, setShowInfoModal] = useState(false);
      const [helpOpenSection, setHelpOpenSection] = useState('gettingStarted');
      const [dictTab, setDictTab] = useState('prefs'); 
      const [chordPrefs, setChordPrefs] = useState({ minor: 'm', major: 'maj', dim: 'dim', halfDim: 'm7b5', romanCase: 'lower' });
      const [customPrefModes, setCustomPrefModes] = useState({}); 
      const [chordDict, setChordDict] = useState([]);
      const [newDictEntry, setNewDictEntry] = useState({ trigger: '', jazz: '', roman: '', nashville: '' });

      // UI State
      const [showLeftPanel, setShowLeftPanel] = useState(true);
      const [showRightPanel, setShowRightPanel] = useState(true);
      const [isMobile, setIsMobile] = useState(false);
      const [contextMenu, setContextMenu] = useState(null);
      const [projects, setProjects] = useState([]);
      const [currentProjectId, setCurrentProjectId] = useState(`proj_${Date.now()}`);
      const [projectName, setProjectName] = useState('Untitled Score');
      const [showDashboard, setShowDashboard] = useState(true);
      const [showExportModal, setShowExportModal] = useState(false);
      const [exportFileName, setExportFileName] = useState('');
      const [exportPageMode, setExportPageMode] = useState('all');
      const [exportCustomRange, setExportCustomRange] = useState('');
      const [exportIncludeAnnotations, setExportIncludeAnnotations] = useState(true);
      const [exportRespectHidden, setExportRespectHidden] = useState(true);
      const [exportSelectedLayers, setExportSelectedLayers] = useState(null);

      // Undo/Redo & State
      const [history, setHistory] = useState([[]]);
      const [historyIndex, setHistoryIndex] = useState(0);
      const [annotations, setAnnotations] = useState([]); 

      const [selectedIds, setSelectedIds] = useState([]);
      const [clipboard, setClipboard] = useState([]);
      const [lasso, setLasso] = useState(null); 
      const [dragContext, setDragContext] = useState(null);
      
      // Panning and Parameters State
      const [isPanning, setIsPanning] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const [toastMessage, setToastMessage] = useState(null);
      const [isSpacePressed, setIsSpacePressed] = useState(false);
      const [isDraggingFile, setIsDraggingFile] = useState(false);

      const panStartRef = useRef({ x: 0, y: 0, scrollLeft: 0, scrollTop: 0 });
      
      const [pasteAtCursor, setPasteAtCursor] = useState(true);
      const [preserveFormatting, setPreserveFormatting] = useState(false);
      const latestMousePos = useRef({ x: 50, y: 50, page: 1 });
      
      const [isDrawing, setIsDrawing] = useState(false);
      const [currentPath, setCurrentPath] = useState(null);
      const [currentPenSize, setCurrentPenSize] = useState(3);
      const [currentHighlighterSize, setCurrentHighlighterSize] = useState(16);
      const [currentColor, setCurrentColor] = useState('#2563eb');
      const [currentFontSize, setCurrentFontSize] = useState(16);

      const canvasRefs = useRef({});
      const pageRefs = useRef({});
      const workspaceRef = useRef(null);
      const fileInputRef = useRef(null);
      const projectImportRef = useRef(null);

      // --- PERSISTENCE LOGIC ---
      const [isInitialized, setIsInitialized] = useState(false);
      
      const loadProjectState = async (proj) => {
         sessionStorage.setItem('active_session_project', proj.id);
         setCurrentProjectId(proj.id);
         setProjectName(proj.projectName || 'Untitled Score');
         setAnnotations(proj.annotations || []); setHistory([proj.annotations || []]); setHistoryIndex(0);
         setScoreLayers(proj.scoreLayers || [{id: 'layer-1', name: 'Layer 1', visible: true}]);
         if (proj.appTheme) setAppTheme(proj.appTheme);
         if (proj.chordPrefs) setChordPrefs(proj.chordPrefs);
         if (proj.chordDict) setChordDict(proj.chordDict);
         if (proj.preserveFormatting !== undefined) setPreserveFormatting(proj.preserveFormatting);
         setHiddenPages(proj.hiddenPages || []);
         setPageOrder(proj.pageOrder || []);
         
         setPdfDoc(null); setPdfReady(false);
         try {
            const pdfBytes = await window.localforage.getItem('pdf_' + proj.id);
            if (pdfBytes) {
               // IMPORTANT: pass a copy to pdfjs - it transfers the ArrayBuffer to a worker,
               // detaching the original. We need the original intact for PDF-Lib export/merge.
               const pdfBytesCopy = pdfBytes instanceof Uint8Array ? pdfBytes.slice() : new Uint8Array(pdfBytes);
               const pdf = await window.pdfjsLib.getDocument({data: pdfBytesCopy}).promise;
               setOriginalPdfBytes(pdfBytes); setPdfDoc(pdf); setNumPages(pdf.numPages); setPageNum(1); setPdfReady(true);
            } else {
               setOriginalPdfBytes(null);
            }
         } catch(e) { console.error(e) }
      };

      // Auth Listener
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, async (user) => {
          setCurrentUser(user);
          if (user) {
            try {
              const projectsRef = collection(db, "users", user.uid, "projects");
              const querySnapshot = await getDocs(projectsRef);
              
              if (!querySnapshot.empty) {
                 const loadedProjects = [];
                 querySnapshot.forEach(docSnap => { loadedProjects.push({ id: docSnap.id, ...docSnap.data() }) });

                 if (activeSessionId) {
                    const matched = sorted.find(p => p.id === activeSessionId);

                 }
              } else {
                const legacySnap = await getDoc(doc(db, "users", user.uid));
                if (legacySnap.exists() && legacySnap.data().annotations) {
                  const data = legacySnap.data();
                  const legacyId = `proj_${Date.now()}`;
                  setProjectName('Migrated Score');
                  setCurrentProjectId(legacyId);
                  
                  if (data.annotations) { setAnnotations(data.annotations); setHistory([data.annotations]); setHistoryIndex(0); }
                  if (data.scoreLayers) setScoreLayers(data.scoreLayers);
                  if (data.hiddenPages) setHiddenPages(data.hiddenPages);
                  if (data.pageOrder) setPageOrder(data.pageOrder);
                  if (data.appTheme) setAppTheme(data.appTheme);
                  
                  setProjects([{ id: legacyId, projectName: 'Migrated Score', updatedAt: Date.now() }]);
                  
                  try {
                    const legacyPdf = await window.localforage.getItem('saved_pdf');
                    if(legacyPdf) await window.localforage.setItem('pdf_' + legacyId, legacyPdf);
                  } catch(e){}
                }
              }
            } catch (e) { console.error("Failed to load cloud data.", e); }
          } else {
             const savedProjects = localStorage.getItem('score_annotator_projects');
             if (savedProjects) {
                try {
                   const parsed = JSON.parse(savedProjects);
                   setProjects(parsed);
                   const activeSessionId = sessionStorage.getItem('active_session_project');
                   if (activeSessionId) {
                      const matched = parsed.find(p => p.id === activeSessionId);
                      if (matched) { loadProjectState(matched); setShowDashboard(false); setIsInitialized(true); return; }
                   }
                } catch(e){}
             } else {
                const savedData = localStorage.getItem('score_annotator_data');
                // Could migrate local legacy here, skipping for brevity
             }
          }
          setIsInitialized(true);
        });
        return () => unsubscribe();
      }, []);

      // Data Saving Logic

      useEffect(() => { zoomRef.current = zoom; }, [zoom]);

      // --- PDF EXPORT (PDF-LIB) ---
      const validBytesCast = (bytes) => {
          if (bytes instanceof Uint8Array) return bytes;
          if (bytes.buffer) return new Uint8Array(bytes.buffer);
          return new Uint8Array(Object.values(bytes));
      };
      
      // Parse ranges like "1-3, 5, 7-9" into [1,2,3,5,7,8,9]
      const parsePageRange = (str, total) => {
         const parts = str.split(',').map(s => s.trim()).filter(Boolean);
         const pages = new Set();
         for (const part of parts) {
            if (part.includes('-')) {
               const [from, to] = part.split('-').map(n => parseInt(n.trim()));
               if (!isNaN(from) && !isNaN(to)) {
                  for (let i = Math.max(1, from); i <= Math.min(total, to); i++) pages.add(i);
               }
            } else {
               const n = parseInt(part);
               if (!isNaN(n) && n >= 1 && n <= total) pages.add(n);
            }
         }
         return Array.from(pages).sort((a, b) => a - b);
      };

      const openExportModal = () => {
         if (!originalPdfBytes) {
            setToastMessage('⚠️ Upload a PDF score before exporting!');
            setTimeout(() => setToastMessage(null), 3000);
            return;
         }
         setExportFileName(projectName || 'annotated_score');
         setExportPageMode('all');
         setExportCustomRange('');
         setExportIncludeAnnotations(true);
         setExportRespectHidden(true);
         setExportSelectedLayers(null);
         setShowExportModal(true);
      };

      const exportToPdf = async () => {
        if (!originalPdfBytes) {
           setToastMessage('⚠️ Upload a PDF score before exporting!');
           setTimeout(() => setToastMessage(null), 3000);
           return;
        }
        setIsProcessing(true);
        try {
          const { PDFDocument, rgb } = window.PDFLib;
          
          const validBytes = validBytesCast(originalPdfBytes);
          const originalDoc = await PDFDocument.load(validBytes);
          const pages = originalDoc.getPages();

          const hexToRgb = (hex) => {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex) || ["#000","00","00","00"];
            return rgb(parseInt(result[1], 16)/255, parseInt(result[2], 16)/255, parseInt(result[3], 16)/255);
          };
          
          const { StandardFonts } = window.PDFLib;
          const helveticaFont = await originalDoc.embedFont(StandardFonts.Helvetica);

          for (const [idx, page] of pages.entries()) {
             const p = idx + 1;
             const { width, height } = page.getSize();
             const activeLayers = exportSelectedLayers || scoreLayers.filter(sl => sl.visible).map(sl => sl.id);
             const pageAnns = exportIncludeAnnotations
                ? annotations.filter(a => a.page === p && (!a.layerId || activeLayers.includes(a.layerId)))
                : [];
             
             for (const ann of pageAnns) {
                const color = hexToRgb(ann.color || '#000000');
                const x = (ann.x / 100) * width;
                const topY = (ann.y / 100) * height;
                const y = height - topY; 

                if (ann.type === 'text' || ann.type === 'keysig' || ann.type === 'chord' || ann.type === 'stamp') {
                   let textContent = ann.content;
                   if (ann.type === 'chord') {
                      const translated = parseAndTranslateChord(ann.content, ann.localKey || currentKey, chordPrefs, chordDict);
                      textContent = translated.jazz; 
                   }
                   // Sanitize to latin-1 safe characters for PDF-Lib's built-in fonts
                   const safeText = (textContent || '').toString().split('').filter(c => c.charCodeAt(0) <= 255).join('');
                   try {
                      page.drawText(safeText || ' ', { x, y, size: Math.max(ann.fontSize || 16, 1), color, font: helveticaFont });
                   } catch(textErr) { console.warn('Skipping text annotation:', textErr.message); }
                } else if (ann.type === 'shape') {
                   const startX = (ann.startX / 100) * width;
                   const startY = height - ((ann.startY / 100) * height);
                   const currX = (ann.currX / 100) * width;
                   const currY = height - ((ann.currY / 100) * height);
                   
                   if (ann.drawType === 'rectangle') {
                      const rx = Math.min(startX, currX);
                      const ry = Math.min(startY, currY); 
                      const rw = Math.abs(currX - startX);
                      const rh = Math.abs(currY - startY);
                      page.drawRectangle({ x: rx, y: ry, width: rw, height: rh, borderColor: color, borderWidth: ann.strokeWidth || 3 });
                   } else if (ann.drawType === 'ellipse') {
                      page.drawEllipse({ x: (startX+currX)/2, y: (startY+currY)/2, xScale: Math.abs(currX-startX)/2, yScale: Math.abs(currY-startY)/2, borderColor: color, borderWidth: ann.strokeWidth || 3 });
                   } else if (ann.drawType === 'line') {
                      page.drawLine({ start: {x: startX, y: startY}, end: {x: currX, y: currY}, color, thickness: ann.strokeWidth || 3 });
                   }
                } else if (ann.type === 'draw' || ann.type === 'highlight') {
                   for (let i = 1; i < ann.points.length; i++) {
                      const p1 = ann.points[i-1];
                      const p2 = ann.points[i];
                      page.drawLine({ 
                         start: { x: (p1.x/100)*width, y: height - ((p1.y/100)*height) },
                         end: { x: (p2.x/100)*width, y: height - ((p2.y/100)*height) },
                         color, thickness: ann.strokeWidth || 3,
                         opacity: ann.drawType === 'highlight' ? 0.4 : 1.0
                      });
                   }
                }
             }
          }
          
          
          const finalDoc = await PDFDocument.create();
          const ord = pageOrder.length === pages.length ? pageOrder : Array.from({length: pages.length}, (_, i) => i + 1);
          
          let selectedPages;
          if (exportPageMode === 'current') {
             selectedPages = [pageNum];
          } else if (exportPageMode === 'custom' && exportCustomRange.trim()) {
             selectedPages = parsePageRange(exportCustomRange, pages.length);
          } else {
             selectedPages = [...ord];
          }
          
          const pagesToExport = exportRespectHidden
             ? selectedPages.filter(x => !hiddenPages.includes(x))
             : selectedPages;

          if (pagesToExport.length > 0) {
             const copyIndices = pagesToExport.map(x => x - 1).filter(idx => idx >= 0 && idx < pages.length);
             const copiedPages = await finalDoc.copyPages(originalDoc, copyIndices);
             copiedPages.forEach(p => finalDoc.addPage(p));
          } else {
             finalDoc.addPage([500, 500]);
          }
          
          const pdfBytes = await finalDoc.save();
          const blob = new Blob([pdfBytes], { type: "application/pdf" });
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          const safeFileName = (exportFileName || projectName || 'score').replace(/[^a-z0-9_\-\s]/gi, '_').trim() || 'annotated_score';
          link.download = `${safeFileName}.pdf`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
          setToastMessage('PDF Export Complete 📄');
          setTimeout(() => setToastMessage(null), 3000);
          setShowExportModal(false);
        } catch (err) {
          console.error("Export Error", err);
          setToastMessage('Export Error: ' + (err.message || 'Verification Failed'));
          setTimeout(() => setToastMessage(null), 4000);
        }
        setIsProcessing(false);
      };

      // --- PROJECT EXPORT / IMPORT ---
      const exportProject = () => {
        const data = JSON.stringify({ annotations, chordPrefs, chordDict, preserveFormatting }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });

      };

      const importProject = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (parsed.annotations) { setAnnotations(parsed.annotations); setHistory(prev => [...prev, parsed.annotations]); setHistoryIndex(prev => prev + 1); setSelectedIds([]); }
            if (parsed.chordPrefs) setChordPrefs(parsed.chordPrefs);
            if (parsed.chordDict) setChordDict(parsed.chordDict);
            if (parsed.preserveFormatting !== undefined) setPreserveFormatting(parsed.preserveFormatting);

      // --- RESPONSIVENESS & ZOOM CONTROLS ---
      useEffect(() => {
        const checkResponsive = () => {
          const mobile = window.innerWidth < 768;
          setIsMobile(mobile);
          if (mobile) { setShowLeftPanel(false); setShowRightPanel(false); setZoom(1.0); }
          else { setShowLeftPanel(true); setShowRightPanel(true); setZoom(1.5); }
        };
        checkResponsive();
        window.addEventListener('resize', checkResponsive);
        return () => window.removeEventListener('resize', checkResponsive);
      }, []);

      useEffect(() => {
        const container = workspaceRef.current;
        if (!container) return;

        const handleWheel = (e) => {
          if (e.ctrlKey || e.metaKey || e.shiftKey) { 
            e.preventDefault();
            const zoomChange = e.deltaY > 0 ? -0.1 : 0.1;
            setZoom(z => Math.max(0.5, Math.min(4.0, z + zoomChange)));
          }
        };

        let startDist = 0;
        let startZoom = 1;

        const handleTouchStart = (e) => {
           if (e.touches.length === 2) {
              startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
              startZoom = zoomRef.current;
           }
        };

        const handleTouchMove = (e) => {
           if (e.touches.length === 2) {
              e.preventDefault(); 
              const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
              const scale = dist / startDist;
              setZoom(Math.max(0.5, Math.min(4.0, startZoom * scale)));
           }
        };

        container.addEventListener('wheel', handleWheel, { passive: false });
        container.addEventListener('touchstart', handleTouchStart, { passive: false });
        container.addEventListener('touchmove', handleTouchMove, { passive: false });

        return () => {
          container.removeEventListener('wheel', handleWheel);
          container.removeEventListener('touchstart', handleTouchStart);
          container.removeEventListener('touchmove', handleTouchMove);
        };
      }, [pdfDoc]);

      // Load PDF.js
      useEffect(() => {
        const loadPdfJs = async () => {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          script.onload = () => {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
            setPdfReady(true);
          };
          document.head.appendChild(script);
        };
        loadPdfJs();
      }, []);

      const processFile = async (file) => processFileWithId(file, currentProjectId);
      
      const processFileWithId = async (file, projId) => {
        if (!file) return;
        setIsProcessing(true);
        const fileReader = new FileReader();
        fileReader.onload = async function() {
          const typedarray = new Uint8Array(this.result);
          setOriginalPdfBytes(typedarray);
          window.localforage.setItem('pdf_' + projId, typedarray);
          try {
            // Pass a copy to pdfjs so it doesn't transfer/detach our original typedarray
            const pdf = await window.pdfjsLib.getDocument({data: typedarray.slice()}).promise;
            setPdfDoc(pdf);
            setNumPages(pdf.numPages);
            setPageNum(1);
            setPdfReady(true);
          } catch (err) { console.error("Error loading PDF", err); }
          setIsProcessing(false);
          setIsDraggingFile(false);
        };
        fileReader.readAsArrayBuffer(file);
      };

      const handleIncomingFile = (file) => {
        if (!file) return;
        // Only show prompt if we already have a real score loaded
        if (pdfReady && originalPdfBytes) {
            setImportPromptFile(file);
        } else {
            processFile(file);
        }
      };
      
      const handleMergePdf = async () => {
          if (!importPromptFile || !originalPdfBytes) return;
          setIsProcessing(true);
          const fileToProcess = importPromptFile;
          setImportPromptFile(null);
          try {
              const fileReader = new FileReader();
              fileReader.onload = async function() {
                 try {
                     const newBytes = new Uint8Array(this.result);
                     const { PDFDocument } = window.PDFLib;
                     const currentPdf = await PDFDocument.load(validBytesCast(originalPdfBytes));
                     const newPdf = await PDFDocument.load(newBytes);
                     
                     const copiedPages = await currentPdf.copyPages(newPdf, newPdf.getPageIndices());
                     copiedPages.forEach(p => currentPdf.addPage(p));
                     
                     const mergedBytes = await currentPdf.save();
                     setOriginalPdfBytes(mergedBytes);
                     window.localforage.setItem('pdf_' + currentProjectId, mergedBytes);
                     
                     // Pass a copy to pdfjs to avoid buffer transfer/detach
                     const pdf = await window.pdfjsLib.getDocument({data: mergedBytes.slice()}).promise;
                     setPdfDoc(pdf);
                     setNumPages(pdf.numPages);
                     setIsProcessing(false);
                     setToastMessage('PDFs Merged Successfully! 🗂️');
                     setTimeout(() => setToastMessage(null), 3000);
                 } catch(err) {
                    console.error(err);
                    setToastMessage('Merge failed: ' + err.message);
                    setTimeout(() => setToastMessage(null), 3000);
                    setIsProcessing(false);
                 }
              };
              fileReader.readAsArrayBuffer(fileToProcess);
          } catch(e) {
              console.error(e);
              setIsProcessing(false);
          }
      };

      const handleStartNewWithFile = () => {
         const newId = `proj_${Date.now()}`;
         const fileToProcess = importPromptFile;
         setImportPromptFile(null);
         setCurrentProjectId(newId);
         setProjectName('New Score');
         setAnnotations([]); setHistory([[]]); setHistoryIndex(0);
         setPdfDoc(null); setOriginalPdfBytes(null); setPdfReady(false);
         setScoreLayers([{id: 'layer-1', name: 'Layer 1', visible: true}]);
         setHiddenPages([]); setPageOrder([]);
         // Pass newId explicitly since React state won't have updated yet
         processFileWithId(fileToProcess, newId);
      };

      const handleFileUpload = (e) => {
        handleIncomingFile(e.target.files[0]);
        e.target.value = ''; 
      };

      const handleWindowDragOver = (e) => { 
        e.preventDefault(); 
        // Only show file drag indicator for actual external files, not internal thumbnail reordering
        if (draggedPageIdx === null) setIsDraggingFile(true); 
      };
      const handleWindowDragLeave = (e) => { e.preventDefault(); if (e.relatedTarget === null) setIsDraggingFile(false); };
      const handleWindowDrop = (e) => {
        e.preventDefault();
        setIsDraggingFile(false);
        // If we were dragging a gallery thumbnail, this is an internal drag - ignore file import
        if (draggedPageIdx !== null) {
          setDraggedPageIdx(null);
          return;
        }
        if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
          handleIncomingFile(e.dataTransfer.files[0]);
        }
      };

      // --- PDF RENDERING LOOP ---
      useEffect(() => {
        if (!pdfDoc) return;
        let isMounted = true;
        const renderTasks = [];

        const renderPages = async () => {
          const pages = viewMode === 'continuous' ? Array.from({length: numPages}, (_, i) => i + 1) : [pageNum];

          for (const p of pages) {
            if (!isMounted) break;
            const canvas = canvasRefs.current[p];
            if (!canvas) continue;

            try {
              const page = await pdfDoc.getPage(p);
              const viewport = page.getViewport({ scale: zoom });
              const context = canvas.getContext('2d');
              canvas.height = viewport.height;
              canvas.width = viewport.width;

              const renderTask = page.render({ canvasContext: context, viewport });
              renderTasks.push(renderTask);
              await renderTask.promise; 
            } catch (err) { }
          }
        };
        renderPages();
        
        return () => {
          isMounted = false;
          renderTasks.forEach(t => { try { t.cancel(); } catch(e){} });
        };
      }, [pdfDoc, pageNum, zoom, viewMode, numPages]);

      // --- HISTORY & STATE MANAGEMENT ---
      const commitAnnotations = (newAnns) => {
        setAnnotations(newAnns);
        const newHistory = history.slice(0, historyIndex + 1);
        newHistory.push(newAnns);
        setHistory(newHistory);
        setHistoryIndex(newHistory.length - 1);
      };

      const undo = () => { if (historyIndex > 0) { setHistoryIndex(historyIndex - 1); setAnnotations(history[historyIndex - 1]); setSelectedIds([]); } };
      const redo = () => { if (historyIndex < history.length - 1) { setHistoryIndex(historyIndex + 1); setAnnotations(history[historyIndex + 1]); setSelectedIds([]); } };
      const deleteSelected = () => { if (selectedIds.length === 0) return; commitAnnotations(annotations.filter(a => !selectedIds.includes(a.id))); setSelectedIds([]); };
      const copySelected = () => { const selected = annotations.filter(a => selectedIds.includes(a.id)); if (selected.length > 0) setClipboard(selected); };

      const pasteClipboard = () => {
        if (clipboard.length === 0) return;
        let dx = 2, dy = 2;
        const targetPage = pasteAtCursor ? (latestMousePos.current.page || pageNum) : pageNum;

        if (pasteAtCursor) {
          const minX = Math.min(...clipboard.map(a => a.type === 'draw' ? Math.min(...a.points.map(p => p.x)) : a.x));
          const minY = Math.min(...clipboard.map(a => a.type === 'draw' ? Math.min(...a.points.map(p => p.y)) : a.y));
          dx = latestMousePos.current.x - minX;
          dy = latestMousePos.current.y - minY;
        }
        
        const newIds = [];
        const newAnns = clipboard.map(a => {
          const newId = Date.now() + Math.random();
          newIds.push(newId);
          if (a.type === 'draw') return { ...a, id: newId, page: targetPage, points: a.points.map(p => ({ x: p.x + dx, y: p.y + dy })) };
          return { ...a, id: newId, page: targetPage, x: a.x + dx, y: a.y + dy };
        });
        commitAnnotations([...annotations, ...newAnns]);
        setSelectedIds(newIds);
        setTool('select');
      };

      // --- KEYBOARD SHORTCUTS ---
      useEffect(() => {
        const handleKeyDown = (e) => {
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
          if (e.key === 'Backspace' || e.key === 'Delete') deleteSelected();
          if (e.key === ' ' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); setIsSpacePressed(true); }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); if (e.shiftKey) redo(); else undo(); }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') { e.preventDefault(); copySelected(); }
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteClipboard(); }
        };
        const handleKeyUp = (e) => { if (e.key === ' ') setIsSpacePressed(false); };
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        return () => { window.removeEventListener('keydown', handleKeyDown); window.removeEventListener('keyup', handleKeyUp); };
      }, [annotations, selectedIds, clipboard, historyIndex, history]);

      // --- INTERACTION LOGIC (Per Page) ---
      const handleBackgroundDown = (e, p) => {
        if (!pdfDoc) return;
        if (isMobile) { setShowLeftPanel(false); setShowRightPanel(false); }

        // Prevent ghost drag of the canvas on desktop
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'SELECT') {
           e.preventDefault();
        }

        const rect = pageRefs.current[p].getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;

        if ((tool === 'select' && !e.shiftKey) || isSpacePressed) {
          try { e.currentTarget.setPointerCapture(e.pointerId); } catch(err) {}
          setSelectedIds([]);
          setIsPanning(true);
          panStartRef.current = {
            x: e.clientX,
            y: e.clientY,
            scrollLeft: workspaceRef.current.scrollLeft,
            scrollTop: workspaceRef.current.scrollTop
          };
          return; 
        } else if (tool === 'lasso' || (tool === 'select' && e.shiftKey)) {
          setLasso({ startX: x, startY: y, currX: x, currY: y, page: p });
          if (!e.shiftKey) setSelectedIds([]);
        } else if (tool === 'stamp') {
          const newId = Date.now();
          commitAnnotations([...annotations, { id: newId, type: 'text', page: p, x, y, content: currentStamp, color: currentColor, fontSize: Math.max(32, currentFontSize * 1.5), layerId: activeLayer }]);
          setTool('select');
        } else if (tool === 'shape') {
          setIsDrawing(true);
          setCurrentPath({ type: 'shape', drawType: currentShape, page: p, color: currentColor, layerId: activeLayer, strokeWidth: currentPenSize, startX: x, startY: y, currX: x, currY: y });
        } else if (tool === 'draw' || tool === 'highlight') {
          setIsDrawing(true);
          setCurrentPath({ type: 'draw', drawType: tool, page: p, color: currentColor, strokeWidth: tool === 'draw' ? currentPenSize : currentHighlighterSize, points: [{x, y}], layerId: activeLayer });
        } else {
          const newId = Date.now();
          const content = tool === 'chord' ? 'C' : tool === 'keysig' ? currentKey : 'Notes...';
          const newAnn = { 
            id: newId, type: tool, page: p, x, y, layerId: activeLayer,
            content, color: currentColor, fontSize: currentFontSize, localKey: tool === 'chord' ? currentKey : undefined 
          };
          commitAnnotations([...annotations, newAnn]);
          setSelectedIds([newId]);
          setTool('select');
          if (isMobile) setShowRightPanel(true);
        }
      };

      
      const handleItemContextMenu = (e, id, p) => {
        e.preventDefault();
        e.stopPropagation();
        if (!selectedIds.includes(id)) {
           setSelectedIds([id]);
        }
        setContextMenu({ mouseX: e.clientX, mouseY: e.clientY, itemId: id, pageNum: p });
      };

      const handleItemDown = (e, id, p) => {
        e.stopPropagation();
        if (tool === 'eraser') {
            setAnnotations(annotations.filter(a => a.id !== id));
            return;
        }
        if (tool !== 'select' && tool !== 'lasso') return;
        if (isMobile) setShowRightPanel(true);

        let newSelected = [...selectedIds];
        if (e.shiftKey) {
          if (newSelected.includes(id)) newSelected = newSelected.filter(i => i !== id);
          else newSelected.push(id);
        } else {
          if (!newSelected.includes(id)) newSelected = [id];
        }
        setSelectedIds(newSelected);

        const rect = pageRefs.current[p].getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        
        const dragItems = annotations.filter(a => newSelected.includes(a.id)).map(a => ({ 
          id: a.id, startX: a.x, startY: a.y, startPoints: a.type === 'draw' ? a.points : null, origStartX: a.startX, origStartY: a.startY, origCurrX: a.currX, origCurrY: a.currY 
        }));
        setDragContext({ mouseX: x, mouseY: y, items: dragItems, page: p });
      };

      const handlePointerMove = (e, p) => {
        if (isPanning) {
          const dx = e.clientX - panStartRef.current.x;
          const dy = e.clientY - panStartRef.current.y;
          if (workspaceRef.current) {
            workspaceRef.current.scrollLeft = panStartRef.current.scrollLeft - dx;
            workspaceRef.current.scrollTop = panStartRef.current.scrollTop - dy;
          }
          return;
        }

        const container = pageRefs.current[p];
        if (!container) return;
        const rect = container.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        
        latestMousePos.current = { x, y, page: p };

        if (lasso && lasso.page === p) {
          setLasso({ ...lasso, currX: x, currY: y });
          const minX = Math.min(lasso.startX, x), maxX = Math.max(lasso.startX, x);
          const minY = Math.min(lasso.startY, y), maxY = Math.max(lasso.startY, y);
          const inBounds = annotations.filter(a => {
            if (a.page !== p) return false;
            if (!a.layerId || scoreLayers.find(sl => sl.id === a.layerId)?.visible === false) return false;
            if (a.type === 'draw' || a.type === 'highlight') {
               return a.points.some(pt => pt.x >= minX && pt.x <= maxX && pt.y >= minY && pt.y <= maxY);
            } else if (a.type === 'shape') {
               const shapeMinX = Math.min(a.startX, a.currX), shapeMaxX = Math.max(a.startX, a.currX);
               const shapeMinY = Math.min(a.startY, a.currY), shapeMaxY = Math.max(a.startY, a.currY);
               return (shapeMaxX >= minX && shapeMinX <= maxX && shapeMaxY >= minY && shapeMinY <= maxY);
            } else {
               return a.x >= minX && a.x <= maxX && a.y >= minY && a.y <= maxY;
            }
          }).map(a => a.id);
          setSelectedIds(inBounds);
        } else if (dragContext && dragContext.type === 'resize' && dragContext.page === p) {
          const dx = x - dragContext.mouseX;
          const dy = y - dragContext.mouseY;
          setAnnotations(annotations.map(a => a.id === dragContext.id ? { ...a, currX: dragContext.origCurrX + dx, currY: dragContext.origCurrY + dy } : a));
        } else if (dragContext && dragContext.page === p) {
          const dx = x - dragContext.mouseX;
          const dy = y - dragContext.mouseY;
          setAnnotations(annotations.map(a => {
            const startItem = dragContext.items.find(i => i.id === a.id);
            if (startItem) {
              if (a.type === 'draw') return { ...a, points: startItem.startPoints.map(p => ({ x: p.x + dx, y: p.y + dy })) };
              if (a.type === 'shape') return { ...a, startX: startItem.origStartX + dx, startY: startItem.origStartY + dy, currX: startItem.origCurrX + dx, currY: startItem.origCurrY + dy };
              return { ...a, x: startItem.startX + dx, y: startItem.startY + dy };
            }
            return a;
          }));
        } else if (isDrawing && currentPath && currentPath.page === p && tool === 'shape') {
          setCurrentPath(prev => ({ ...prev, currX: x, currY: y }));
        } else if (isDrawing && currentPath && currentPath.page === p && (tool === 'draw' || tool === 'highlight')) {
          setCurrentPath(prev => ({ ...prev, points: [...prev.points, {x, y}] }));
        }
      };

      const handlePointerUp = (e) => {
        if (isPanning) {
           setIsPanning(false);
           try { if (e && e.currentTarget) e.currentTarget.releasePointerCapture(e.pointerId); } catch(err) {}
        }
        if (lasso) setLasso(null);
        else if (dragContext) { commitAnnotations(annotations); setDragContext(null); } 
        else if (isDrawing && currentPath) { commitAnnotations([...annotations, { id: Date.now(), ...currentPath }]); setIsDrawing(false); setCurrentPath(null); }
      };

      const updateSelectedAnnotations = (updates, finalizeHistory = false) => {
        const newAnns = annotations.map(a => selectedIds.includes(a.id) ? { ...a, ...updates } : a);
        if (finalizeHistory) commitAnnotations(newAnns);
        else setAnnotations(newAnns); 

        if (preserveFormatting) {
          if (updates.color) setCurrentColor(updates.color);
          if (updates.fontSize) setCurrentFontSize(updates.fontSize);
          if (updates.strokeWidth) {
            const itemType = annotations.find(a => a.id === selectedIds[0])?.drawType;
            if (itemType === 'highlight') setCurrentHighlighterSize(updates.strokeWidth);
            else if (itemType === 'draw') setCurrentPenSize(updates.strokeWidth);
          }
        }
      };

      const createSvgPath = (points) => points?.reduce((acc, pt, i) => i === 0 ? `M ${pt.x} ${pt.y}` : `${acc} L ${pt.x} ${pt.y}`, '') || '';

      const addDictEntry = () => {
        if (!newDictEntry.trigger) return;
        setChordDict([...chordDict, { ...newDictEntry, id: Date.now().toString() }]);
        setNewDictEntry({ trigger: '', jazz: '', roman: '', nashville: '' });
      };

      const goToNextPage = () => {
        let next = pageNum + 1;
        while(hiddenPages.includes(next) && next <= numPages) next++;
        if(next <= numPages) setPageNum(next);
      };
      
      const goToPrevPage = () => {
        let prev = pageNum - 1;
        while(hiddenPages.includes(prev) && prev >= 1) prev--;
        if(prev >= 1) setPageNum(prev);
      };
      
      const canGoNext = () => { let n = pageNum + 1; while(hiddenPages.includes(n) && n <= numPages) n++; return n <= numPages; };
      const canGoPrev = () => { let n = pageNum - 1; while(hiddenPages.includes(n) && n >= 1) n--; return n >= 1; };

      const handleThumbnailClick = (p) => {
        setPageNum(p);
        if (viewMode === 'continuous' && pageRefs.current[p]) {
          pageRefs.current[p].scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      };

      const PrefSelect = ({ label, prefKey, options }) => {
        const isCustomMode = customPrefModes[prefKey];
        return (
          <div className="space-y-2">
            <label className="text-sm font-bold text-slate-700">{label}</label>
            {isCustomMode ? (
              <div className="flex gap-2">
                <input 
                  type="text" 
                  value={chordPrefs[prefKey]} 
                  onChange={e => setChordPrefs({...chordPrefs, [prefKey]: e.target.value})} 
                  className="flex-1 border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 font-bold" 
                  autoFocus 
                />
                <button onClick={() => setCustomPrefModes({...customPrefModes, [prefKey]: false})} className="p-2 text-slate-500 hover:bg-slate-200 rounded transition-colors"><X size={16} /></button>
              </div>
            ) : (
              <select 
                value={options.map(o => o.value).includes(chordPrefs[prefKey]) ? chordPrefs[prefKey] : 'CUSTOM'}
                onChange={e => {
                  if (e.target.value === 'CUSTOM') {
                    setCustomPrefModes({...customPrefModes, [prefKey]: true});
                    setChordPrefs({...chordPrefs, [prefKey]: ''}); 
                  } else {
                    setChordPrefs({...chordPrefs, [prefKey]: e.target.value});
                  }
                }} 
                className="w-full border border-slate-300 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500"
              >
                {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                <option value="CUSTOM">Custom Symbol...</option>
              </select>
            )}
          </div>
        );
      };

      const handleScroll = () => {
        if (viewMode !== 'continuous') return;
        const container = workspaceRef.current;
        if (!container) return;
        let closestPage = pageNum;
        let minDistance = Infinity;
        
        Object.entries(pageRefs.current).forEach(([p, el]) => {
          if (!el) return;
          const rect = el.getBoundingClientRect();
          const containerCenter = container.getBoundingClientRect().top + container.clientHeight / 3; 
          const pageCenter = rect.top + rect.height / 2;
          const distance = Math.abs(containerCenter - pageCenter);
          
          if (distance < minDistance) {
            minDistance = distance;
            closestPage = Number(p);
          }
        });
        
        if (closestPage !== pageNum) setPageNum(closestPage);
      };

      const toggleViewMode = (mode) => {
        setViewMode(mode);
        if (mode === 'continuous') {
          setTimeout(() => {
            if (pageRefs.current[pageNum]) {
              pageRefs.current[pageNum].scrollIntoView({ behavior: 'auto', block: 'start' });
            }
          }, 50);
        }
      };

      useEffect(() => {
        if (numPages > 0) {
           setPageOrder(prev => {
              if (prev.length === numPages) return prev;
              if (prev.length > numPages) return Array.from({length: numPages}, (_, i) => i + 1);
              const added = Array.from({length: numPages - prev.length}, (_, i) => prev.length + i + 1);
              return [...prev, ...added];
           });
        }
      }, [numPages]);

      const activePageOrder = pageOrder.length === numPages ? pageOrder : Array.from({length: numPages || 0}, (_, i) => i + 1);
      const visibleOrder = activePageOrder.filter(p => !hiddenPages.includes(p));
      const pagesToRender = viewMode === 'continuous' ? visibleOrder : (hiddenPages.includes(pageNum) ? [] : [pageNum]);

      return (
        <div className="h-screen w-full bg-workspace flex flex-col font-sans overflow-hidden text-main" onDragOver={handleWindowDragOver} onDragLeave={handleWindowDragLeave} onDrop={handleWindowDrop}>
          {isDraggingFile && <div className="absolute inset-0 z-[100] bg-blue-500/20 backdrop-blur-sm border-4 border-blue-500 border-dashed flex items-center justify-center pointer-events-none"><div className="bg-panel p-6 rounded-xl shadow-2xl flex flex-col items-center gap-4"><Upload size={48} className="text-blue-500 animate-bounce" /><h2 className="text-2xl font-bold text-main">Drop PDF here</h2></div></div>}
          {toastMessage && <div className="fixed bottom-6 right-6 bg-slate-800 text-white px-4 py-3 rounded-lg shadow-2xl z-[100] font-bold text-sm animate-in slide-in-from-bottom-5 fade-in">{toastMessage}</div>}
          {/* Top Window Bar */}
          <header className="glass-panel p-2 md:p-3 flex items-center justify-between z-30 shadow-sm print:hidden flex-shrink-0">
            <div className="flex items-center gap-3 md:gap-4">
              <button onClick={() => setShowLeftPanel(!showLeftPanel)} className="p-1.5 rounded hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors text-main"><Menu size={20} /></button>
              <button onClick={() => setShowDashboard(true)} className="p-1.5 rounded hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors text-main flex items-center gap-1.5 text-sm font-bold opacity-80 hover:opacity-100 mr-2"><FolderOpen size={16}/> <span className="hidden md:inline">Library</span></button>
              <div className="hidden lg:flex items-center gap-2 mr-2">
                 <input type="text" value={projectName} onChange={(e) => setProjectName(e.target.value)} className="bg-transparent text-[1.1rem] md:text-xl font-bold tracking-tight font-display outline-none border-b border-transparent hover:border-slate-300 focus:border-blue-500 w-48 transition-colors text-main" />
              </div>
              
              
              <label className="cursor-pointer bg-blue-600 hover:bg-blue-500 text-white px-3 md:px-4 py-1.5 rounded text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                <Upload size={16} /> <span className="hidden sm:inline">Import PDF</span>
                <input type="file" accept="application/pdf" ref={fileInputRef} className="hidden" onChange={handleFileUpload} />
              </label>
            </div>
            
            <div className="flex items-center gap-1 md:gap-2">
               <button onClick={undo} disabled={historyIndex === 0} className="p-1.5 rounded hover:bg-slate-200/50 dark:hover:bg-slate-700/50 disabled:opacity-30 text-main transition-colors" title="Undo"><Undo size={18} /></button>
               <button onClick={redo} disabled={historyIndex === history.length - 1} className="p-1.5 rounded hover:bg-slate-200/50 dark:hover:bg-slate-700/50 disabled:opacity-30 text-main transition-colors" title="Redo"><Redo size={18} /></button>
               <div className="w-px h-6 bg-slate-300 dark:bg-slate-700 mx-1 md:mx-2 hidden sm:block" />
               
               <div className="hidden lg:flex items-center gap-1">
                 <button onClick={exportProject} className="flex items-center gap-2 text-muted hover:text-main px-2 py-1.5 rounded text-sm font-medium transition-colors" title="Download Analysis Project">
                    <Save size={16} /> Save Workspace
                 </button>
                 <label className="cursor-pointer flex items-center gap-2 text-muted hover:text-main px-2 py-1.5 rounded text-sm font-medium transition-colors" title="Load Analysis Project">
                    <FolderOpen size={16} /> Load Workspace
                    <input type="file" accept=".json" ref={projectImportRef} className="hidden" onChange={importProject} />
                 </label>
               </div>
               
               <button onClick={openExportModal} disabled={!originalPdfBytes || isProcessing} className="hidden md:flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-3 py-1.5 rounded text-sm font-medium transition-colors shadow-sm disabled:opacity-50" title="Download Annotated PDF">
                  <Download size={16} /> Export PDF
               </button>
               
               <div className="w-px h-6 bg-slate-300 dark:bg-slate-700 mx-1 md:mx-2" />

               {/* Auth Button */}
               {currentUser ? (
                 <button onClick={() => signOut(auth)} className="flex items-center gap-2 bg-panel hover:bg-slate-100 dark:hover:bg-slate-800 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded text-sm font-medium transition-colors">
                   <User size={16} className="text-blue-500"/> <span className="hidden sm:inline">Sign Out</span>
                 </button>
               ) : (
                 <button onClick={() => setShowAuthModal(true)} className="flex items-center gap-2 bg-panel hover:bg-slate-100 dark:hover:bg-slate-800 border border-slate-300 dark:border-slate-600 px-3 py-1.5 rounded text-sm font-medium transition-colors text-main">
                   <LogIn size={16} /> <span className="hidden sm:inline">Sign In</span>
                 </button>
               )}
               <button onClick={() => setShowInfoModal(true)} className="p-1.5 rounded hover:bg-slate-200/50 dark:hover:bg-slate-700/50 transition-colors ml-1 text-muted hover:text-main" title="Help & Info"><HelpCircle size={20} /></button>
            </div>
          </header>

          <div className="flex flex-1 overflow-hidden h-full relative">
            {/* Unified Left Sidebar */}
            <aside className={`absolute md:relative top-0 left-0 h-full bg-panel border-r border-slate-300 dark:border-slate-700 flex flex-col z-40 shadow-xl print:hidden flex-shrink-0 transition-transform duration-300 ease-in-out w-72 md:w-80 ${showLeftPanel ? 'translate-x-0' : '-translate-x-full hidden md:flex md:w-0 md:opacity-0'}`}>
               <div className="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-8">
                 
                 {/* TOOLS SECTION */}
                 <div className="space-y-3">
                   <h3 className="text-[11px] font-bold text-muted uppercase tracking-[0.1em] px-1 flex items-center gap-2">Tools</h3>
                   <div className="grid grid-cols-2 gap-2">
                     {[
                       { id: 'select', icon: MousePointer2, label: 'Select' },
                       { id: 'lasso', icon: BoxSelect, Square, Circle, Minus, Eraser, label: 'Lasso' },
                       { id: 'chord', icon: Music, label: 'Chord' },
                       { id: 'keysig', icon: Key, label: 'Key' },
                       { id: 'text', icon: Type, label: 'Text' },
                       { id: 'draw', icon: PenTool, label: 'Pen' },
                       { id: 'shape', icon: Square, label: 'Shapes' },
                       { id: 'highlight', icon: Highlighter, label: 'Highlight' },
                       { id: 'eraser', icon: Eraser, label: 'Eraser' },
                       { id: 'stamp', icon: Stamp, label: 'Stamps' }
                     ].map(t => (
                       <button key={t.id} onClick={() => { setTool(t.id); setSelectedIds([]); if(isMobile) setShowLeftPanel(false); }} className={`p-2 rounded flex items-center gap-2 text-sm transition-all border ${t.id === 'highlight' ? 'col-span-2' : ''} ${tool === t.id ? 'bg-blue-500 text-white border-blue-600 shadow-sm' : 'bg-workspace text-main border-transparent hover:border-slate-300 dark:hover:border-slate-600 hover:shadow-sm'}`}>
                         <t.icon size={16} strokeWidth={tool === t.id ? 2.5 : 2} /> <span className="font-medium">{t.label}</span>
                       </button>
                     ))}
                   </div>
                 </div>

                 <div className="w-full h-px bg-slate-200 dark:bg-slate-700/50" />

                 {/* PROPERTIES SECTION */}
                 <div className="space-y-3 min-h-[150px]">
                   <h3 className="text-[11px] font-bold text-muted uppercase tracking-[0.1em] px-1 flex items-center justify-between">
                     <span>Properties</span>
                     {selectedIds.length > 0 && <span className="text-blue-500 bg-blue-500/10 px-1.5 rounded-sm">{selectedIds.length}</span>}
                   </h3>
                   
                   {tool === 'stamp' && (
                     <div className="space-y-2 pb-3 border-b border-slate-200 dark:border-slate-700/50 mb-4">
                       <label className="text-xs font-bold text-muted uppercase tracking-wider">Musical Stamp</label>
                       <div className="grid grid-cols-5 gap-1 bg-workspace p-1 rounded border border-slate-300 dark:border-slate-600 font-serif text-xl">
                          {['♩', '♪', '♫', '♬', '♯', '♭', '♮', '𝄞', '𝄢', '𝄐', '𝄋', '𝄌', 'p', 'mf', 'f', 'sfz'].map(stp => (
                              <button key={stp} onClick={() => setCurrentStamp(stp)} className={`p-1.5 rounded flex justify-center transition-colors ${currentStamp === stp ? 'bg-panel shadow-sm text-blue-500 font-bold' : 'text-muted hover:text-main'}`}>{stp}</button>
                          ))}
                       </div>
                     </div>
                   )}
                   
                   {tool === 'shape' && (
                     <div className="space-y-2 pb-3 border-b border-slate-200 dark:border-slate-700/50 mb-4">
                       <label className="text-xs font-bold text-muted uppercase tracking-wider">Shape Type</label>
                       <div className="flex gap-2 bg-workspace p-1 rounded border border-slate-300 dark:border-slate-600">
                          <button onClick={() => setCurrentShape('rectangle')} className={`flex-1 p-1.5 rounded flex justify-center transition-colors ${currentShape === 'rectangle' ? 'bg-panel shadow-sm text-main' : 'text-muted hover:text-main'}`}><Square size={16}/></button>
                          <button onClick={() => setCurrentShape('ellipse')} className={`flex-1 p-1.5 rounded flex justify-center transition-colors ${currentShape === 'ellipse' ? 'bg-panel shadow-sm text-main' : 'text-muted hover:text-main'}`}><Circle size={16}/></button>
                          <button onClick={() => setCurrentShape('line')} className={`flex-1 p-1.5 rounded flex justify-center transition-colors ${currentShape === 'line' ? 'bg-panel shadow-sm text-main' : 'text-muted hover:text-main'}`}><Minus size={16}/></button>
                       </div>
                     </div>
                   )}
                   
                   {selectedIds.length === 0 ? (
                      <div className="text-center text-muted mt-6 px-4">
                        <MousePointer2 size={24} className="mx-auto mb-2 opacity-50" />
                        <p className="text-xs">Select an annotation to edit properties.</p>
                      </div>
                   ) : (
                      <div className="space-y-5 animate-in fade-in duration-200">
                         {/* Content Editor */}
                         {selectedIds.length === 1 && annotations.find(a => a.id === selectedIds[0])?.type !== 'draw' && (
                           <div className="space-y-2">
                             <label className="text-xs font-bold text-muted">Content</label>
                             {annotations.find(a => a.id === selectedIds[0])?.type === 'keysig' ? (
                                <select value={annotations.find(a => a.id === selectedIds[0])?.content || ''} onChange={e => { updateSelectedAnnotations({ content: e.target.value }, false); commitAnnotations(annotations); }} className="w-full bg-workspace border border-slate-300 dark:border-slate-600 text-main rounded p-2 text-sm">
                                  {PITCHES.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                             ) : annotations.find(a => a.id === selectedIds[0])?.type === 'chord' ? (
                                <input type="text" value={annotations.find(a => a.id === selectedIds[0])?.content || ''} onChange={e => updateSelectedAnnotations({ content: e.target.value }, false)} onBlur={() => commitAnnotations(annotations)} className="w-full bg-workspace border border-slate-300 dark:border-slate-600 text-main rounded p-2 text-sm font-mono" />
                             ) : (
                                <textarea value={annotations.find(a => a.id === selectedIds[0])?.content || ''} onChange={e => updateSelectedAnnotations({ content: e.target.value }, false)} onBlur={() => commitAnnotations(annotations)} className="w-full bg-workspace border border-slate-300 dark:border-slate-600 text-main rounded p-2 text-sm h-24 resize-none" />

                             {annotations.find(a => a.id === selectedIds[0])?.type === 'chord' && (
