                    </HelpSection>

                    <HelpSection id="tools" title="Annotation Tools" icon={<PenTool size={16}/>}>
                      <Row label="Select" desc="Click any annotation to select it and show its properties. Drag it to move. Click and drag an empty area to pan the canvas." />
                      <Row label="Lasso" desc="Click and drag to draw a free-form selection rectangle. All annotations inside will be selected as a group for moving or deleting." />
                      <Row label="Chord" desc="Click anywhere on the score to place a chord symbol. Type the chord name and press Enter. The app translates it into Jazz, Roman Numeral, and Nashville notation automatically based on your key setting." />
                      <Row label="Key" desc="Place a key signature annotation. These are treated as text objects and can be styled freely." />
                      <Row label="Text" desc="Click to drop a free-text annotation anywhere. Use it for fingerings, tempo markings, notes, or any custom label." />
                      <Row label="Pen" desc="Draw freehand strokes directly on the score. Adjust stroke width and color in the Properties sidebar." />
                      <Row label="Highlight" desc="Brush semi-transparent color over measures or passages to visually group them. Works like a musical highlighter pen." />
                      <Row label="Shapes" desc="Draw Rectangles, Ellipses, or Lines to box, circle, or underline passages. Choose the shape type from the right-click context menu or Properties panel." />
                      <Row label="Eraser" desc="Click any annotation to instantly delete it without selecting it first — useful for rapid cleanup." />
                      <Row label="Stamps" desc="Drop pre-built musical symbols (fermatas, dynamics, clefs, accidentals, note values) directly onto the score. Pick your stamp from the Stamps panel." />
                    </HelpSection>

                    <HelpSection id="selection" title="Selecting & Editing" icon={<MousePointer2 size={16}/>}>
                      <Row label="Select One" desc="Click any annotation with the Select tool to activate it. Its properties appear in the left sidebar." />
                      <Row label="Select Multiple" desc="Hold Shift and click to add/remove items from your selection. Or use the Lasso tool to drag-select a group." />
                      <Row label="Move" desc="Drag any selected annotation to reposition it. Multiple selected items move together." />
                      <Row label="Resize Shapes" desc="Select a shape or text annotation and drag the resize handle (blue dot) that appears at its corner." />
                      <Row label="Right-Click Menu" desc="Right-click any annotation to access Copy, Delete, and Move to Layer options. On mobile, these actions appear in the Properties sidebar." />
                      <Row label="Properties" desc="With an annotation selected, the left sidebar shows its color, size, font size, stroke width, and local key, all editable inline." />
                    </HelpSection>

                    <HelpSection id="chords" title="Smart Chord System" icon={<Music size={16}/>}>
                      <Row label="How It Works" desc="Type any chord symbol (e.g. Cmaj7, ii7, V7/IV, bVII) and the engine translates it into Jazz letter names, Roman numerals, and Nashville numbers simultaneously." />
                      <Row label="Key Signature" desc="Set the global key from the Key toolbar button or the Properties sidebar. Each chord can also have its own local key override for modulations." />
                      <Row label="Display Mode" desc="Toggle between Jazz, Roman, and Nashville notation from the Properties panel when a chord is selected." />
                      <Row label="Dictionary" desc="Open the Dictionary & Prefs panel (in App Settings sidebar) to add custom chord mappings that override the default engine." />
                      <Row label="Custom Prefs" desc="Set your preferred notation style per chord quality (e.g., always show minor chords as 'm' vs '−'). These preferences persist across sessions." />
                    </HelpSection>

                    <HelpSection id="layers" title="Layers" icon={<Layers size={16}/>}>
                      <Row label="What Are Layers?" desc="Layers let you group annotations into independent stacks — like a Practice layer, a Performance layer, or a Teacher layer — that can each be shown or hidden independently." />
                      <Row label="Add a Layer" desc="Click the + button next to 'LAYERS' in the left sidebar to create a new layer. All new annotations will be placed on the currently active (highlighted) layer." />
                      <Row label="Switch Active Layer" desc="Click a layer card in the sidebar to make it active. Any annotation you create after that will be assigned to this layer." />
                      <Row label="Toggle Visibility" desc="Click the Eye icon on any layer card to show or hide its annotations. Hidden layers are excluded from exports unless you override in the Export dialog." />
                      <Row label="Delete a Layer" desc="Click the Trash icon on any non-default layer to delete it and all annotations on it." />
                      <Row label="Move to Layer" desc="Right-click any annotation and select 'Move to Layer' to reassign it. On mobile, use the Properties sidebar option." />
                      <Row label="Export by Layer" desc="In the Export PDF dialog, you can individually check which layers to include in the downloaded file." />
                    </HelpSection>

                    <HelpSection id="pages" title="Page Management" icon={<LayoutGrid size={16}/>}>
                      <Row label="Gallery View" desc="Toggle the Gallery bar above the canvas to see all pages as thumbnails. Click any thumbnail to jump to that page." />
                      <Row label="Hide Pages" desc="Click the Eye icon beneath a thumbnail in the Gallery to hide that page. Hidden pages are removed from the scroll view and export (by default)." />
                      <Row label="Reorder Pages" desc="In Gallery view, drag and drop a thumbnail left or right to reorder pages. The scroll view and export will both follow your new order." />
                      <Row label="Single vs Scroll" desc="Toggle between Single Page and Continuous Scroll viewing modes using the buttons in the toolbar. Single mode uses arrow buttons to flip pages." />
                    </HelpSection>

                    <HelpSection id="projects" title="Projects & Library" icon={<FolderOpen size={16}/>}>
                      <Row label="Library" desc="Click the Library button in the top-left to open your projects dashboard. All your saved scores appear here as cards with thumbnail previews." />
                      <Row label="New Project" desc="Click the + New Project card in the Library to start a fresh workspace. Your previous project is saved automatically." />
                      <Row label="Rename" desc="Click the project name in the top header to edit it inline. The name syncs to the library card and cloud immediately." />
                      <Row label="Thumbnails" desc="After uploading a PDF, a thumbnail is automatically captured and stored. It appears on your library card for easy identification." />
                      <Row label="Delete a Project" desc="Hover over any library card and click the Trash icon that appears to permanently delete it." />
                      <Row label="Merging PDFs" desc="Drag a new PDF onto an open project to get a prompt: you can merge the new pages onto the end of your current score, or open it as a brand-new project." />
                      <Row label="Session Resume" desc="If you refresh the page while a project is open, the app automatically returns you to that project instead of the Library." />
                    </HelpSection>

                    <HelpSection id="export" title="Exporting" icon={<Download size={16}/>}>
                      <Row label="Export PDF" desc="Click 'Export PDF' in the header to open the Export dialog. Your annotations are burned directly into the PDF binary." />
                      <Row label="File Name" desc="Choose a custom file name for the download. Special characters are auto-sanitized." />
                      <Row label="Page Selection" desc="Choose from: All Pages, Visible Only (skip hidden), Current Page, or a Custom Range (e.g. '1-3, 5, 8-10')." />
                      <Row label="Skip Hidden" desc="The 'Skip Hidden Pages' option is on by default. Uncheck it to include pages you've hidden in the gallery." />
                      <Row label="Burn Annotations" desc="Uncheck 'Burn Annotations' to export a clean copy of the original score without any markings." />
                      <Row label="Layer Selection" desc="If you have multiple layers, individual layer checkboxes appear so you can choose exactly which annotation layers to include." />
                      <Row label="Save Workspace" desc="The 'Save Workspace' and 'Load Workspace' buttons in the header let you export/import your annotation data as a raw JSON file for backup or sharing." />
                    </HelpSection>

                    <HelpSection id="cloud" title="Cloud Sync & Accounts" icon={<User size={16}/>}>
                      <Row label="Sign In" desc="Click 'Sign In' in the top header to log in with email/password or Google. Signing in enables cross-device cloud sync." />
                      <Row label="Auto-Save" desc="Any time you make a change (annotation, rename, layer toggle), the app auto-saves to the cloud within a few seconds." />
                      <Row label="Offline Mode" desc="Without an account, your annotations and settings are saved to your browser's local storage. They persist between sessions on the same device." />
                      <Row label="PDF Caching" desc="Uploaded PDFs are stored in your browser's IndexedDB cache (not the cloud) to avoid storage limits. On a new device, upload the PDF again and your cloud annotations will snap back into place." />
                    </HelpSection>

                    <HelpSection id="shortcuts" title="Keyboard Shortcuts" icon={<Settings size={16}/>}>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                        {[
                          ['Ctrl/Cmd + Z', 'Undo'], ['Ctrl/Cmd + Y', 'Redo'],
                          ['Ctrl/Cmd + C', 'Copy selected'], ['Ctrl/Cmd + V', 'Paste'],
                          ['Delete / Backspace', 'Delete selected'], ['Escape', 'Deselect all'],
                          ['Shift + Scroll', 'Zoom in/out'], ['V', 'Select tool'],
                          ['P', 'Pen tool'], ['H', 'Highlight tool'],
                          ['T', 'Text tool'], ['E', 'Eraser tool'],
                        ].map(([key, action]) => (
                          <div key={key} className="flex items-center gap-2 py-1">
                            <Kbd>{key}</Kbd>
                            <span className="text-xs">{action}</span>
                          </div>
                        ))}
                      </div>
                    </HelpSection>

                  </div>

                  <div className="px-6 py-3 border-t border-slate-200 dark:border-slate-700 bg-workspace flex justify-between items-center flex-shrink-0">
                    <span className="text-[10px] text-muted select-none">©2026 Warren Co. All rights reserved.</span>
                    <button onClick={() => setShowInfoModal(false)} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg font-bold transition-colors shadow-sm text-sm">Close</button>
                  </div>
                </div>
              </div>
            );
          })()}

          {/* Dictionary Modal */}
          {showDictModal && (
            <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-panel text-main rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col overflow-hidden animate-in fade-in zoom-in duration-200 border border-white/10">
                <div className="flex items-center justify-between p-4 border-b border-slate-200/20 glass-panel">
                  <h2 className="text-lg font-bold flex items-center gap-2"><BookOpen size={20} className="text-blue-500" /> Dictionary & Formatting</h2>
                  <button onClick={() => setShowDictModal(false)} className="text-muted hover:bg-slate-200/20 p-1.5 rounded transition-colors"><X size={20} /></button>
                </div>
                
                <div className="flex border-b border-slate-200/20 bg-panel">
                  <button onClick={() => setDictTab('prefs')} className={`flex-1 py-3 text-sm font-bold transition-colors ${dictTab === 'prefs' ? 'text-blue-500 border-b-2 border-blue-500 bg-blue-500/5' : 'text-muted hover:bg-slate-200/10'}`}>Global Preferences</button>
                  <button onClick={() => setDictTab('library')} className={`flex-1 py-3 text-sm font-bold transition-colors ${dictTab === 'library' ? 'text-blue-500 border-b-2 border-blue-500 bg-blue-500/5' : 'text-muted hover:bg-slate-200/10'}`}>Custom Chord Library</button>
                </div>

                <div className="p-6 overflow-y-auto custom-scrollbar flex-1 bg-workspace">
                  {dictTab === 'prefs' ? (
                    <div className="space-y-6">
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <PrefSelect label="Minor Symbol" prefKey="minor" options={[{label: 'm (e.g. Cm7)', value: 'm'}, {label: '- (e.g. C-7)', value: '-'}]} />
                        <PrefSelect label="Major Symbol" prefKey="major" options={[{label: 'maj (e.g. Cmaj7)', value: 'maj'}, {label: 'Δ (e.g. CΔ7)', value: 'Δ'}, {label: 'M (e.g. CM7)', value: 'M'}]} />
                        <PrefSelect label="Diminished" prefKey="dim" options={[{label: 'dim', value: 'dim'}, {label: '°', value: '°'}]} />
                        <PrefSelect label="Half-Diminished" prefKey="halfDim" options={[{label: 'm7b5', value: 'm7b5'}, {label: 'ø', value: 'ø'}]} />
                        
                        <div className="space-y-2 md:col-span-2 p-4 border border-slate-200/20 rounded-lg bg-panel shadow-sm">
                          <label className="text-xs font-bold text-muted uppercase">Roman Numeral Minor Casing</label>
                          <select value={chordPrefs.romanCase} onChange={e => setChordPrefs({...chordPrefs, romanCase: e.target.value})} className="w-full bg-workspace border border-slate-300 dark:border-slate-600 text-main rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 font-bold">
                            <option value="lower">Lowercase (e.g. ii7)</option>
                            <option value="upper">Uppercase with minor symbol (e.g. II-7 or IIm7)</option>
                          </select>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div className="space-y-6">
                      <div className="bg-panel p-5 rounded-xl border border-slate-200/20 shadow-sm space-y-4">
                        <h3 className="font-bold text-main text-sm">Add Custom Chord Rule</h3>
                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                          <input type="text" placeholder="Trigger (e.g. T)" value={newDictEntry.trigger} onChange={e => setNewDictEntry({...newDictEntry, trigger: e.target.value})} className="bg-workspace border border-slate-300 dark:border-slate-600 text-main rounded p-2 text-sm focus:ring-2 focus:ring-blue-500" />
                          <input type="text" placeholder="Jazz (e.g. Fm7b5)" value={newDictEntry.jazz} onChange={e => setNewDictEntry({...newDictEntry, jazz: e.target.value})} className="bg-workspace border border-slate-300 dark:border-slate-600 text-main rounded p-2 text-sm focus:ring-2 focus:ring-blue-500" />
                          <input type="text" placeholder="Roman (e.g. iv7b5)" value={newDictEntry.roman} onChange={e => setNewDictEntry({...newDictEntry, roman: e.target.value})} className="bg-workspace border border-slate-300 dark:border-slate-600 text-main rounded p-2 text-sm focus:ring-2 focus:ring-blue-500" />
                          <input type="text" placeholder="Nashville (e.g. 4m7b5)" value={newDictEntry.nashville} onChange={e => setNewDictEntry({...newDictEntry, nashville: e.target.value})} className="bg-workspace border border-slate-300 dark:border-slate-600 text-main rounded p-2 text-sm focus:ring-2 focus:ring-blue-500" />
                        </div>
                        <button onClick={addDictEntry} disabled={!newDictEntry.trigger} className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:hover:bg-blue-600 text-white p-2.5 rounded text-sm font-bold flex items-center justify-center gap-2 transition-colors shadow-sm">
                          <Plus size={16} /> Add to Library
                        </button>
                      </div>

                      <div className="space-y-3">
                        <h3 className="font-bold text-main text-sm px-1">Your Library</h3>
                        {chordDict.length === 0 ? (
                          <div className="p-6 bg-panel border-dashed border-2 border-slate-200/50 rounded-xl text-center">
                             <p className="text-muted text-sm font-medium">No custom chords configured yet.</p>
                          </div>
                        ) : (
                          <div className="border border-slate-200/20 shadow-sm rounded-xl overflow-hidden">
                            <table className="w-full text-left text-sm">
                              <thead className="bg-panel text-muted text-xs uppercase tracking-wider">
                                <tr><th className="p-3">Trigger</th><th className="p-3">Jazz</th><th className="p-3">Roman</th><th className="p-3">Nashville</th><th className="p-3 w-10"></th></tr>
                              </thead>
                              <tbody className="divide-y divide-slate-200/20 bg-workspace">
                                {chordDict.map(d => (
                                  <tr key={d.id} className="hover:bg-slate-200/10">
                                    <td className="p-3 font-bold text-main">{d.trigger}</td>
                                    <td className="p-3 font-mono text-muted">{d.jazz}</td>
                                    <td className="p-3 font-serif text-muted">{d.roman}</td>
                                    <td className="p-3 font-mono text-muted">{d.nashville}</td>
                                    <td className="p-3 text-center">
                                      <button onClick={() => setChordDict(chordDict.filter(x => x.id !== d.id))} className="text-slate-400 hover:text-red-500 transition-colors p-1"><Trash2 size={16} /></button>
                                    </td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        )}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}

          <style>{`
            @media print {
              @page { margin: 0; size: auto; }
              body { -webkit-print-color-adjust: exact; background: white; }
            }
          `}</style>
        </div>
      );

    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
